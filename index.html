<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객 정보 수집</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    
    <!-- 1. 정보 수집 입력 폼 영역 -->
    <div id="form-container">
      <header>
        <h1>고객 정보 수집</h1>
        <p>아래 내용을 빠짐없이 작성해 주시기 바랍니다.</p>
      </header>

      <form id="info-form" novalidate>
        <!-- 이름 (필수) -->
        <div class="form-group">
          <label for="name" class="form-label">이름 <span class="required">*</span></label>
          <input type="text" id="name" name="name" class="form-control" placeholder="홍길동" maxlength="50" autocomplete="name" required>
          <div id="name-error" class="error-message"></div>
        </div>

        <!-- 전화번호 (필수) -->
        <div class="form-group">
          <label for="phone" class="form-label">전화번호 <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" class="form-control" placeholder="010-1234-5678" autocomplete="tel" required>
          <div id="phone-error" class="error-message"></div>
        </div>

        <!-- 이메일 (선택) -->
        <div class="form-group">
          <label for="email" class="form-label">이메일</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="example@domain.com" autocomplete="email">
          <div id="email-error" class="error-message"></div>
        </div>

        <!-- 참고사항 (선택, 최대 500자) -->
        <div class="form-group">
          <label for="field1" class="form-label">참고사항</label>
          <textarea id="field1" name="field1" class="form-control" placeholder="기타 참고할 사항이나 요청을 작성해 주세요." maxlength="505"></textarea>
          <div class="char-counter">
            <span id="char-count">0</span> / 500
          </div>
          <div id="field1-error" class="error-message"></div>
        </div>

        <!-- 제출 버튼 -->
        <button type="submit" id="submit-btn" class="submit-btn">
          <span id="submit-spinner" class="spinner hidden"></span>
          <span id="submit-text">제출하기</span>
        </button>
      </form>

      <p class="disclaimer">
        입력하신 정보는 안전하게 저장되며 화면에 공개되지 않습니다.
      </p>
    </div>

    <!-- 2. 제출 완료 화면 영역 -->
    <div id="success-container" class="result-screen hidden">
      <div class="success-icon">✓</div>
      <h2 class="result-title">제출되었습니다</h2>
      <p class="result-text">
        작성해 주신 정보가 정상적으로 안전하게 기록되었습니다.<br>
        감사합니다.
      </p>
      <button id="reset-btn" class="btn-outline">다시 작성하기</button>
    </div>

    <!-- 3. 에러 발생 알림 영역 -->
    <div id="error-container" class="result-screen hidden">
      <div class="error-alert">
        <div class="error-alert-title">오류 발생</div>
        <div id="error-alert-desc" class="error-alert-desc">서버와의 통신이 원활하지 않습니다.</div>
      </div>
      <button id="error-reset-btn" class="btn-outline">다시 시도하기</button>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
